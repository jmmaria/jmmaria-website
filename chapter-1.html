<script src="https://cdn.tailwindcss.com"></script>
<style>
    /* High-Performance Carousel Engine */
    .carousel-wrapper { width: 100%; overflow: hidden; position: relative; cursor: pointer; padding: 2rem 0; }
    #videoFeed { display: flex; gap: 2.5rem; white-space: nowrap; }
    .video-card { min-width: 85vw; flex-shrink: 0; display: inline-block; }
    @media (min-width: 768px) { .video-card { min-width: 650px; } }

    .video-container { 
        position: relative; padding-bottom: 56.25%; height: 0; border-radius: 2.5rem; 
        overflow: hidden; background: #000; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2); 
    }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
</style>

<div class="py-20 border-b border-slate-50 overflow-hidden bg-white">
    <div class="max-w-7xl mx-auto px-8 mb-10">
        <span class="text-[10px] font-bold text-red-500 uppercase tracking-[0.4em] mb-2 block">01 Archive</span>
        <h2 class="text-5xl font-black uppercase tracking-tighter leading-none">Global Archive</h2>
    </div>

    <div class="carousel-wrapper" id="carouselWrapper">
        <div id="videoFeed">
            
            <div class="video-card px-4">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/videoseries?list=PLhATCoSKZoh7cbZHJut0lrlH1NIxosPLj&autoplay=1&mute=1&loop=1"></iframe>
                </div>
                <div class="mt-6 flex justify-between items-center px-2 uppercase font-bold text-[9px] tracking-widest">
                    <span>United Arab Emirates</span>
                    <a href="https://www.youtube.com/playlist?list=PLhATCoSKZoh7cbZHJut0lrlH1NIxosPLj" target="_blank" class="border-b-2 border-black pb-1 hover:text-red-600 hover:border-red-600 transition">View Playlist</a>
                </div>
            </div>

            <div class="video-card px-4">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/videoseries?list=PLhATCoSKZoh5EfzCjCZzXl3DJC_C_5NZn&autoplay=1&mute=1&loop=1"></iframe>
                </div>
                <div class="mt-6 flex justify-between items-center px-2 uppercase font-bold text-[9px] tracking-widest">
                    <span>Europe Diaries</span>
                    <a href="https://www.youtube.com/playlist?list=PLhATCoSKZoh5EfzCjCZzXl3DJC_C_5NZn" target="_blank" class="border-b-2 border-black pb-1 hover:text-red-600 hover:border-red-600 transition">View Playlist</a>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const feed = document.getElementById('videoFeed');
    const wrap = document.getElementById('carouselWrapper');
    let scroll = 0; 
    let paused = false;

    // Clone for infinite loop
    feed.innerHTML += feed.innerHTML;

    function auto() { 
        if(!paused) { 
            scroll += 1.5; // Speed control
            wrap.scrollLeft = scroll; 
            if(scroll >= feed.scrollWidth / 2) {
                scroll = 0; 
                wrap.scrollLeft = 0;
            } 
        } 
        requestAnimationFrame(auto); 
    }

    wrap.onmouseenter = () => paused = true; 
    wrap.onmouseleave = () => paused = false; 
    
    // Mobile touch support
    wrap.ontouchstart = () => paused = true;
    wrap.ontouchend = () => paused = false;

    auto();
</script>
