<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* High-Performance Carousel Engine */
        .carousel-wrapper { width: 100%; overflow: hidden; position: relative; cursor: pointer; padding: 2rem 0; }
        #videoFeed { display: flex; gap: 2.5rem; white-space: nowrap; }
        .video-card { min-width: 85vw; flex-shrink: 0; display: inline-block; }
        @media (min-width: 768px) { .video-card { min-width: 650px; } }

        .video-container { 
            position: relative; padding-bottom: 56.25%; height: 0; border-radius: 2.5rem; 
            overflow: hidden; background: #000; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .video-card:hover .video-container { transform: scale(1.02); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        /* Hide scrollbar for Chrome, Safari and Opera */
        .carousel-wrapper::-webkit-scrollbar { display: none; }
        /* Hide scrollbar for IE, Edge and Firefox */
        .carousel-wrapper { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-white">

<div class="py-20 border-b border-slate-50 overflow-hidden bg-white">

    </div>

    <div class="carousel-wrapper" id="carouselWrapper">
        <div id="videoFeed">
            
            <div class="video-card px-4">

                <div class="mt-6 flex justify-between items-center px-2 uppercase font-bold text-[9px] tracking-[0.2em]">
                    <span class="text-slate-900">Archive 01</span>
                    <a href="https://youtu.be/FNltoH5j3v4" target="_blank" class="border-b-2 border-black pb-1 hover:text-red-600 hover:border-red-600 transition-all">Watch Video</a>
                </div>
            </div>

            <div class="video-card px-4">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/XuLwZVjsTag?rel=0" allowfullscreen></iframe>
                </div>
                <div class="mt-6 flex justify-between items-center px-2 uppercase font-bold text-[9px] tracking-[0.2em]">

            </div>

            <div class="video-card px-4">

                    <iframe src="https://www.youtube.com/embed/VXyzkHhVQvk?rel=0" allowfullscreen></iframe>

                <div class="mt-6 flex justify-between items-center px-2 uppercase font-bold text-[9px] tracking-[0.2em]">
                    <span class="text-slate-900">Archive 03</span>
                    <a href="https://youtu.be/VXyzkHhVQvk" target="_blank" class="border-b-2 border-black pb-1 hover:text-red-600 hover:border-red-600 transition-all">Watch Video</a>
                </div>
            </div>

            <div class="video-card px-4">

                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const feed = document.getElementById('videoFeed');
    const wrap = document.getElementById('carouselWrapper');
    let scroll = 0; 
    let paused = false;

    // Clone content for infinite loop
    feed.innerHTML += feed.innerHTML;

    function auto() { 
        if(!paused) { 
            scroll += 1.2; 
            wrap.scrollLeft = scroll; 
            
            if(scroll >= feed.scrollWidth / 2) {
                scroll = 0; 
                wrap.scrollLeft = 0;
            } 
        } 
        requestAnimationFrame(auto); 
    }

    wrap.onmouseenter = () => paused = true; 
    wrap.onmouseleave = () => paused = false; 
    wrap.ontouchstart = () => paused = true;
    wrap.ontouchend = () => paused = false;

    auto();
</script>

</body>
</html>
