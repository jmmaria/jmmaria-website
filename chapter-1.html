<script src="https://cdn.tailwindcss.com"></script>
<style>
    .carousel-wrapper { width: 100%; overflow: hidden; position: relative; cursor: pointer; }
    #videoFeed { display: flex; gap: 2.5rem; white-space: nowrap; }
    .video-card { min-width: 650px; flex-shrink: 0; }
    .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 2.5rem; overflow: hidden; background: #000; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
</style>

<div class="py-20 border-b border-slate-50 overflow-hidden">
    <div class="px-8 mb-10"><span class="text-[10px] font-bold text-red-500 uppercase tracking-[0.4em]">01 Archive</span><h2 class="text-5xl font-black uppercase tracking-tighter">Global Archive</h2></div>
    <div class="carousel-wrapper" id="carouselWrapper"><div id="videoFeed">
        <div class="video-card"><div class="video-container"><iframe src="https://www.youtube.com/embed/videoseries?list=PLhATCoSKZoh7cbZHJut0lrlH1NIxosPLj&autoplay=1&mute=1&loop=1"></iframe></div><div class="mt-4 flex justify-between uppercase font-bold text-[9px]"><span>United Arab Emirates</span><a href="#">View Playlist</a></div></div>
        <div class="video-card"><div class="video-container"><iframe src="https://www.youtube.com/embed/videoseries?list=PLhATCoSKZoh5EfzCjCZzXl3DJC_C_5NZn&autoplay=1&mute=1&loop=1"></iframe></div><div class="mt-4 flex justify-between uppercase font-bold text-[9px]"><span>Europe Diaries</span><a href="#">View Playlist</a></div></div>
    </div></div>
</div>

<script>
    const feed = document.getElementById('videoFeed');
    const wrap = document.getElementById('carouselWrapper');
    let scroll = 0; let paused = false;
    feed.innerHTML += feed.innerHTML;
    function auto() { if(!paused) { scroll += 1.5; wrap.scrollLeft = scroll; if(scroll >= feed.scrollWidth/2) scroll = 0; } requestAnimationFrame(auto); }
    wrap.onmouseenter = () => paused = true; wrap.onmouseleave = () => paused = false; auto();
</script>
