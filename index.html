<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JM MARIA | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Mrs+Saint+Delafield&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }

        /* Logo: Straight line, refined size */
        .logo-signature {
            font-family: 'Mrs Saint Delafield', cursive;
            font-size: 32px; 
            white-space: nowrap;
            line-height: 1;
            color: #000;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        /* Nav Wrapper: Prevents hiding on mobile via horizontal scroll */
        .nav-scroll-container {
            display: flex;
            align-items: center;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
            padding-bottom: 4px; /* Space for the active indicator if needed */
        }

        .nav-scroll-container::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .nav-link {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding: 0 12px;
            color: #94a3b8; /* Slate 400 */
            transition: color 0.3s ease;
        }

        .nav-link:hover { color: #000; }
        .nav-link.active { color: #ef4444; } /* Red 500 for active/special chapters */

        /* Smooth reveal for content */
        .fade-in {
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-white">

    <header class="fixed top-0 left-0 w-full bg-white/95 backdrop-blur-md z-[100] border-b border-gray-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between gap-4">
            
            <div class="flex-shrink-0">
                <a href="index.html" class="logo-signature">Jm Maria</a>
            </div>

            <nav class="nav-scroll-container flex-1 justify-end md:justify-center">
                <a href="chapter-1.html" class="nav-link">01 Archive</a>
                <a href="chapter-2.html" class="nav-link">02 Hotels</a>
                <a href="chapter-3.html" class="nav-link active">03 Cafes</a>
                <a href="chapter-4.html" class="nav-link">04 Connect</a>
                <a href="chapter-5.html" class="nav-link">05 Shop</a>
                <a href="chapter-6.html" class="nav-link active">06 Inquiries</a>
            </nav>

            <div class="flex-shrink-0 hidden sm:block">
                <a href="https://youtube.com/@jmmaria" target="_blank" 
                   class="bg-black text-white px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-red-600 transition">
                    Subscribe
                </a>
            </div>

        </div>
    </header>

    <main class="pt-20">
        <section class="h-[90vh] flex flex-col items-center justify-center text-center px-6 fade-in">
            <span class="text-[10px] font-bold text-red-500 uppercase tracking-[0.5em] mb-4">Established 2026</span>
            <h1 class="text-7xl md:text-9xl font-black uppercase tracking-tighter leading-[0.85] mb-6">
                Visual<br>
                <span style="font-family:'Playfair Display'; font-style:italic;" class="text-slate-100">Curation</span>
            </h1>
            <p class="max-w-md text-slate-400 text-xs leading-relaxed uppercase tracking-widest">
                A digital archive of spaces, aesthetics, and high-fidelity captures.
            </p>
            
            <div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2">
                <span class="text-[8px] font-black uppercase tracking-widest">Scroll</span>
                <div class="w-[1px] h-12 bg-slate-200"></div>
            </div>
        </section>

        </main>

</body>
</html>
