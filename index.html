<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JM Maria | Luxury UGC Creator Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #0a0a0a;
  color: #f8f8f8;
  line-height: 1.6;
  overflow-x: hidden;
}

:root {
  --gold-primary: #d4af37;
  --gold-secondary: #ffd700;
  --glass-bg: rgba(255,255,255,0.03);
  --glass-border: rgba(255,255,255,0.08);
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(20px);
  z-index: 1000;
  padding: 16px 0;
  transition: all 0.3s ease;
}

.nav-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 5%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 400;
  background: linear-gradient(135deg, var(--gold-primary), var(--gold-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-decoration: none;
}

.nav-links {
  display: flex;
  list-style: none;
  gap: 32px;
  align-items: center;
}

.nav-link {
  color: #f8f8f8;
  text-decoration: none;
  font-weight: 500;
  position: relative;
  transition: color 0.3s ease;
}

.nav-link:hover {
  color: var(--gold-primary);
}

.nav-link::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--gold-primary), var(--gold-secondary));
  transition: width 0.3s ease;
}

.nav-link:hover::after {
  width: 100%;
}

.mobile-menu {
  display: none;
  font-size: 24px;
  background: none;
  border: none;
  color: #f8f8f8;
  cursor: pointer;
}

/* HERO */
.hero {
  min-height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 120px 20px 60px;
  background: radial-gradient(ellipse at center, rgba(212,175,55,0.08) 0%, transparent 70%);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 48px;
  margin: 40px 0;
  flex-wrap: wrap;
}

.stat {
  text-align: center;
}

.stat-number {
  font-size: 48px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold-primary), var(--gold-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: block;
}

.stat-label {
  font-size: 14px;
  color: #b8b8b8;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 500;
}

/* SECTIONS */
.section {
  padding: 120px 5%;
  max-width: 1400px;
  margin: 0 auto;
}

.section h2 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 400;
  text-align: center;
  margin-bottom: 80px;
  position: relative;
}

.section h2::after {
  content: '';
  position: absolute;
  bottom: -16px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold-primary), var(--gold-secondary), transparent);
}

/* PORTFOLIO */
.portfolio-tabs {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 60px;
  flex-wrap: wrap;
}

.tab-btn {
  padding: 12px 24px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--glass-border);
  border-radius: 50px;
  color: #f8f8f8;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.3s ease;
}

.tab-btn.active {
  background: linear-gradient(135deg, var(--gold-primary), var(--gold-secondary));
  color: #000;
  border-color: var(--gold-primary);
}

.portfolio-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
  gap: 32px;
}

.portfolio-item {
  position: relative;
  border-radius: 24px;
  overflow: hidden;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
}

.portfolio-item:hover {
  transform: translateY(-12px);
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  border-color: rgba(212,175,55,0.3);
}

.portfolio-video {
  width: 100%;
  height: 240px;
  object-fit: cover;
}

.portfolio-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(135deg, rgba(212,175,55,0.9), rgba(255,215,0,0.9));
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.portfolio-item:hover .portfolio-overlay {
  opacity: 1;
}

.portfolio-content {
  padding: 32px;
}

.portfolio-content h3 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  margin-bottom: 8px;
}

.portfolio-metrics {
  display: flex;
  gap: 20px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.metric {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  color: #b8b8b8;
}

.metric i { color: var(--gold-primary); }

/* PRICING */
.pricing-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 32px;
  margin-top: 60px;
}

.pricing-card {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 48px 32px;
  text-align: center;
  border: 1px solid var(--glass-border);
  position: relative;
  transition: all 0.4s ease;
}

.pricing-card.featured {
  border-color: var(--gold-primary);
  transform: scale(1.05);
  box-shadow: 0 32px 80px rgba(212,175,55,0.3);
}

.pricing-card.featured::before {
  content: 'MOST POPULAR';
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--gold-primary);
  color: #000;
  padding: 6px 20px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
}

.price {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  font-weight: 400;
  color: var(--gold-primary);
  margin: 24px 0;
}

.pricing-card.featured .price {
  background: linear-gradient(135deg, var(--gold-primary), var(--gold-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* TESTIMONIALS */
.testimonials-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 32px;
  margin-top: 60px;
}

.testimonial {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  padding: 40px 32px;
  border-radius: 20px;
  border: 1px solid var(--glass-border);
  position: relative;
}

.testimonial::before {
  content: '"';
  font-size: 64px;
  color: var(--gold-primary);
  position: absolute;
  top: 20px;
  left: 24px;
  font-family: serif;
}

.testimonial-text {
  font-style: italic;
  margin-bottom: 24px;
  font-size: 18px;
  padding-left: 40px;
}

.testimonial-author {
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 500;
}

.author-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-primary), var(--gold-secondary));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  color: #000;
}

/* SERVICES */
.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 32px;
}

.service-card {
  text-align: center;
  padding: 48px 24px;
}

.service-icon {
  width: 80px;
  height: 80px;
  border-radius: 20px;
  background: linear-gradient(135deg, var(--gold-primary), var(--gold-secondary));
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  font-size: 32px;
  color: #000;
  box-shadow: 0 12px 32px rgba(212,175,55,0.4);
}

/* CTA */
.cta-section {
  background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(255,215,0,0.1));
  border-radius: 24px;
  padding: 80px;
  text-align: center;
  margin: 80px auto;
  max-width: 800px;
  border: 1px solid rgba(212,175,55,0.3);
}

.cta-h2 {
  font-size: 40px;
  margin-bottom: 24px;
}

/* BUTTONS */
.cta-primary, .cta-secondary, .btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 16px 32px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: 500;
  font-size: 16px;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  position: relative;
  overflow: hidden;
}

.cta-primary, .btn {
  background: linear-gradient(135deg, var(--gold-primary), var(--gold-secondary));
  color: #000;
  box-shadow: 0 8px 32px rgba(212,175,55,0.4);
}

.cta-primary:hover, .btn:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 48px rgba(212,175,55,0.6);
}

.cta-secondary {
  background: rgba(255,255,255,0.05);
  color: #f8f8f8;
}

.cta-secondary:hover {
  background: rgba(255,255,255,0.15);
  transform: translateY(-2px);
}

/* FOOTER */
.footer {
  background: #000;
  padding: 60px 5% 40px;
  text-align: center;
  border-top: 1px solid var(--glass-border);
}

.footer-links {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.footer-link {
  color: #b8b8b8;
  text-decoration: none;
  transition: color 0.3s ease;
}

.footer-link:hover {
  color: var(--gold-primary);
}

/* MOBILE */
@media (max-width: 768px) {
  .mobile-menu { display: block; }
  .nav-links {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background: rgba(10,10,10,0.98);
    flex-direction: column;
    padding: 20px;
    gap: 16px;
  }
  
  .nav-links.active { display: flex; }
  
  .hero-stats { gap: 24px; }
  .stat-number { font-size: 36px; }
  
  .section { padding: 80px 20px; }
  .cta-section { padding: 60px 40px; margin: 60px 20px; }
}

/* ANIMATIONS */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-in { animation: fadeInUp 1s ease-out; }
</style>
</head>

<body>

<nav class="navbar" id="navbar">
  <div class="nav-container">
