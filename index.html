<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JM Maria | Travel & Tech Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .serif-title { font-family: 'Playfair Display', serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 1.5rem; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        /* Professional Reel Cards */
        .reel-card { width: 320px; height: 580px; border-radius: 2rem; overflow: hidden; background: #000; border: 8px solid white; box-shadow: 0 30px 60px -12px rgba(0,0,0,0.25); }
        .snap-x { scroll-snap-type: x mandatory; }
        .snap-center { scroll-snap-align: center; }
        .social-link { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .social-link:hover { transform: translateY(-10px); border-color: #ef4444; }
    </style>
</head>
<body class="bg-white text-slate-900">

    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v22.0"></script>

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 h-20 flex items-center px-8 justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center text-white font-black text-[10px]">JM</div>
            <span class="text-lg font-black tracking-tighter uppercase">MARIA</span>
        </div>
        <a href="https://www.youtube.com/@jmmaria?sub_confirmation=1" target="_blank" class="bg-black text-white px-6 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-red-600 transition-all shadow-lg">Subscribe</a>
    </nav>

    <section id="travel" class="py-24 border-b border-slate-50">
        <div class="max-w-7xl mx-auto px-8">
            <h2 class="text-4xl font-black tracking-tighter uppercase mb-12">Global <span class="serif-title italic text-slate-300">Archive</span></h2>
            <div class="flex gap-8 overflow-x-auto pb-10 hide-scroll snap-x">
                <div class="min-w-[85vw] md:min-w-[650px] snap-center">
                    <div class="video-container shadow-2xl mb-6"><iframe src="https://www.youtube.com/embed/videoseries?list=PLhATCoSKZoh7cbZHJut0lrlH1NIxosPLj" frameborder="0" allowfullscreen></iframe></div>
                    <h4 class="font-bold text-xs uppercase tracking-[0.2em]">UAE Series</h4>
                </div>
                </div>
        </div>
    </section>

    <section id="reels" class="py-32 bg-slate-50">
        <div class="max-w-7xl mx-auto px-8 text-center">
            <h2 class="text-4xl font-black tracking-tighter uppercase mb-20">Featured <span class="serif-title italic text-slate-400">Reels</span></h2>
            <div class="flex flex-wrap justify-center gap-10">
                <div class="reel-card">
                    <div class="fb-video" data-href="https://www.facebook.com/reel/17NvQyWii2/" data-width="320" data-show-text="false"></div>
                </div>
                <div class="reel-card">
                    <div class="fb-video" data-href="https://www.facebook.com/reel/1Kzib4Vb6F/" data-width="320" data-show-text="false"></div>
                </div>
                <div class="reel-card">
                    <div class="fb-video" data-href="https://www.facebook.com/reel/1CajYRHHKb/" data-width="320" data-show-text="false"></div>
                </div>
            </div>
        </div>
    </section>

    <section id="nexus" class="py-32 bg-white">
        <div class="max-w-5xl mx-auto px-8 text-center">
            <span class="text-red-600 text-[10px] font-bold uppercase tracking-[0.5em] mb-4 block">Direct Access</span>
            <h2 class="text-6xl font-black tracking-tighter uppercase mb-20 leading-none">The Nexus</h2>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
                <a href="https://www.instagram.com/itsjmmaria" target="_blank" class="social-link p-10 border border-slate-100 rounded-[2.5rem] bg-white flex flex-col items-center">
                    <i class="fab fa-instagram text-4xl mb-6 text-pink-600"></i>
                    <p class="font-black text-[10px] uppercase tracking-widest">Instagram</p>
                </a>
                
                <a href="https://www.tiktok.com/@itsjmmaria" target="_blank" class="social-link p-10 border border-slate-100 rounded-[2.5rem] bg-white flex flex-col items-center">
                    <i class="fab fa-tiktok text-4xl mb-6 text-black"></i>
                    <p class="font-black text-[10px] uppercase tracking-widest">TikTok</p>
                </a>
                
                <a href="https://www.facebook.com/janinamariac" target="_blank" class="social-link p-10 border border-slate-100 rounded-[2.5rem] bg-white flex flex-col items-center">
                    <i class="fab fa-facebook text-4xl mb-6 text-blue-600"></i>
                    <p class="font-black text-[10px] uppercase tracking-widest">Facebook</p>
                </a>
                
                <a href="https://www.youtube.com/@jmmaria" target="_blank" class="social-link p-10 border border-slate-100 rounded-[2.5rem] bg-white flex flex-col items-center">
                    <i class="fab fa-youtube text-4xl mb-4 text-red-600"></i>
                    <p class="font-black text-[10px] uppercase tracking-widest">YouTube</p>
                </a>
            </div>
        </div>
    </section>

    <footer class="py-20 bg-black text-center">
        <p class="text-[10px] font-bold text-slate-700 uppercase tracking-[0.5em]">&copy; 2026 JM MARIA</p>
    </footer>

</body>
</html>
