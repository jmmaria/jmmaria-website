<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JM Maria | Luxury UGC Creator</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root { --gold:#d4af37; }

body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:#050505;
  color:#fff;
}

/* NAV */
.navbar {
  position:fixed;
  width:100%;
  padding:20px;
  text-align:center;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:999;
}

.logo {
  font-family:'Playfair Display';
  color:var(--gold);
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero iframe {
  position:absolute;
  width:120%;
  height:120%;
  opacity:0.25;
}

.hero-content { z-index:2; }

.btn {
  padding:12px 22px;
  background:var(--gold);
  color:black;
  border-radius:30px;
  text-decoration:none;
  margin:5px;
}

/* SECTION */
.section { padding:120px 10%; }

/* VIDEO GRID */
.video-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.video-card video {
  width:100%;
  border-radius:20px;
  cursor:pointer;
}

/* POPUP */
.popup {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

.popup video {
  height:80vh;
  border-radius:20px;
}

/* CONTROLS */
.popup-controls {
  position:absolute;
  right:20px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.popup-controls a {
  background:var(--gold);
  color:black;
  padding:10px 14px;
  border-radius:20px;
  text-decoration:none;
  font-size:14px;
}

/* CLOSE */
.close-btn {
  position:absolute;
  top:20px;
  right:20px;
  font-size:22px;
  cursor:pointer;
}

/* NAVIGATION */
.nav-btn {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:30px;
  cursor:pointer;
}

.prev { left:20px; }
.next { right:20px; }

</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div class="logo">JM Maria</div>
</div>

<!-- HERO -->
<div class="hero">
  <iframe src="https://www.youtube.com/embed/A6S5CHq_Vwk?autoplay=1&mute=1&controls=0&loop=1&playlist=A6S5CHq_Vwk"></iframe>

  <div class="hero-content">
    <h1>JM Maria ✨</h1>
    <p>Luxury • Travel • Viral Finds</p>

    <a href="#videos" class="btn">Watch Videos</a>
    <a href="#shop" class="btn">Shop</a>
  </div>
</div>

<!-- VIDEOS -->
<div class="section" id="videos">
  <h2>🔥 Tap to Watch My Viral Finds</h2>

  <div class="video-grid">

    <div class="video-card">
      <video onclick="openPopup(0)">
        <source src="videos/reel1.mp4">
      </video>
    </div>

    <div class="video-card">
      <video onclick="openPopup(1)">
        <source src="videos/reel2.mp4">
      </video>
    </div>

    <div class="video-card">
      <video onclick="openPopup(2)">
        <source src="videos/reel3.mp4">
      </video>
    </div>

  </div>
</div>

<!-- SHOP -->
<div class="section" id="shop">
  <h2>🛍 Shop My Picks</h2>

  <a href="#" class="btn">Amazon Finds</a>
  <a href="#" class="btn">Beauty</a>
  <a href="#" class="btn">Creator Gear</a>
</div>

<!-- POPUP -->
<div id="popup" class="popup">

  <span class="close-btn" onclick="closePopup()">✕</span>

  <span class="nav-btn prev" onclick="prevVideo()">‹</span>
  <span class="nav-btn next" onclick="nextVideo()">›</span>

  <video id="popupVideo" controls autoplay playsinline></video>

  <div class="popup-controls">
    <a id="fbBtn" target="_blank">▶ Watch Full on Facebook</a>
    <a id="shopBtn" target="_blank">🛍 Shop Now</a>
  </div>

</div>

<script>
const videos = [
  {
    src:"videos/reel1.mp4",
    fb:"https://www.facebook.com/reel/REPLACE_WITH_REAL_ID_1",
    shop:"https://your-affiliate-link-1.com"
  },
  {
    src:"videos/reel2.mp4",
    fb:"https://www.facebook.com/reel/REPLACE_WITH_REAL_ID_2",
    shop:"https://your-affiliate-link-2.com"
  },
  {
    src:"videos/reel3.mp4",
    fb:"https://www.facebook.com/reel/REPLACE_WITH_REAL_ID_3",
    shop:"https://your-affiliate-link-3.com"
  }
];

let current = 0;

function openPopup(index){
  current = index;
  document.getElementById("popup").style.display="flex";
  loadVideo();
}

function loadVideo(){
  const v = videos[current];
  const vid = document.getElementById("popupVideo");

  vid.src = v.src;
  vid.load();
  vid.play().catch(() => {});

  document.getElementById("fbBtn").href = v.fb;
  document.getElementById("shopBtn").href = v.shop;
}

function closePopup(){
  const vid = document.getElementById("popupVideo");
  vid.pause();
  document.getElementById("popup").style.display="none";
}

function nextVideo(){
  current = (current + 1) % videos.length;
  loadVideo();
}

function prevVideo(){
  current = (current - 1 + videos.length) % videos.length;
  loadVideo();
}
</script>

</body>
</html>
