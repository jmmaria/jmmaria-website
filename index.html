<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JM MARIA | jmmaria.com</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        /* 1. LOAD JANE AUSTEN FONT */
        @font-face {
            font-family: 'JaneAusten';
            src: url('JaneAust.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        iframe { width: 100%; border: none; display: block; }

        /* 2. SLANTED STACKED SIGNATURE LOGO */
        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 0.65; /* Tight vertical stack */
            padding: 5px 0;
            text-decoration: none;
            cursor: pointer;
            /* Slant the whole logo container */
            transform: rotate(-6deg); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-text {
            font-family: 'JaneAusten', cursive;
            color: #000;
            /* Small caps effect using lowercase for Jane Austen's style */
            text-transform: lowercase; 
            user-select: none;
            white-space: nowrap;
            transition: color 0.3s ease;
        }

        .text-jm {
            font-size: 28px; /* Smaller size */
            margin-bottom: -2px;
        }

        .text-maria {
            font-size: 32px; /* Maria slightly larger for balance */
            padding-left: 10px; /* Bouncy offset */
        }

        /* Hover Interaction */
        .nav-container:hover .logo-wrap {
            transform: rotate(-3deg) scale(1.05); /* Straightens slightly on hover */
        }

        .nav-container:hover .logo-text {
            color: #ef4444; /* Branding Red */
        }
    </style>
</head>
<body class="bg-white">

    <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-slate-100 h-24 flex items-center px-8 justify-between nav-container">
        
        <a href="#" class="logo-wrap">
            <span class="logo-text text-jm">jm</span>
            <span class="logo-text text-maria">maria</span>
        </a>

        <div class="hidden lg:flex space-x-8 text-[8px] font-bold uppercase tracking-[0.25em] text-slate-400">
            <a href="#travel" class="hover:text-black transition-colors">01 Archive</a>
            <a href="#hotels" class="hover:text-black transition-colors">02 Hotels</a>
            <a href="#cafes" class="hover:text-black transition-colors">03 Cafes</a>
            <a href="#connect" class="hover:text-black transition-colors">04 Connect</a>
            <a href="#shop" class="hover:text-black transition-colors">05 Shop</a>
            <a href="#inquiries" class="text-red-600 font-black">06 Inquiries</a>
        </div>
        
        <a href="https://www.youtube.com/@jmmaria" target="_blank" class="bg-black text-white px-7 py-3.5 rounded-full text-[9px] font-black uppercase tracking-widest hover:bg-red-600 transition-all shadow-sm">
            Subscribe
        </a>
    </nav>

    <main>
        <div id="travel"><iframe src="chapter-1.html" onload="this.style.height=this.contentWindow.document.body.scrollHeight+'px';"></iframe></div>
        <div id="hotels"><iframe src="chapter-2.html" onload="this.style.height=this.contentWindow.document.body.scrollHeight+'px';"></iframe></div>
        <div id="cafes"><iframe src="chapter-3.html" onload="this.style.height=this.contentWindow.document.body.scrollHeight+'px';"></iframe></div>
        <div id="connect"><iframe src="chapter-4.html" onload="this.style.height=this.contentWindow.document.body.scrollHeight+'px';"></iframe></div>
        <div id="shop"><iframe src="chapter-5.html" onload="this.style.height=this.contentWindow.document.body.scrollHeight+'px';"></iframe></div>
        <div id="inquiries"><iframe src="chapter-6.html" onload="this.style.height=this.contentWindow.document.body.scrollHeight+'px';"></iframe></div>
    </main>

    <footer class="py-16 bg-black text-center border-t border-white/5">
        <p class="text-[9px] font-bold text-slate-700 uppercase tracking-[1em]">© 2026 JM MARIA | jmmaria.com</p>
    </footer>

</body>
</html>
