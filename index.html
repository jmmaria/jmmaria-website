<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JM Maria | Master Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .serif-title { font-family: 'Playfair Display', serif; }
        .social-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; }
        .social-card:hover { transform: translateY(-12px); border-color: #000; }
        .follow-badge { position: absolute; top: 1rem; right: 1rem; background: #ef4444; color: white; font-size: 8px; font-weight: 900; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; }
    </style>
</head>
<body class="bg-white text-slate-900">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 h-20 flex items-center px-8 justify-between">
        <div class="font-black tracking-tighter text-xl uppercase">JM MARIA</div>
        <a href="https://www.youtube.com/@jmmaria?sub_confirmation=1" target="_blank" class="bg-black text-white px-8 py-3 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-red-600 transition-all shadow-xl">Subscribe Now</a>
    </nav>

    <section id="nexus" class="py-32">
        <div class="max-w-5xl mx-auto px-8 text-center">
            <span class="text-red-600 text-[10px] font-bold uppercase tracking-[0.5em] mb-4 block">Action Center</span>
            <h2 class="text-6xl font-black tracking-tighter uppercase mb-20 leading-none text-slate-900">The Nexus</h2>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
                <a href="https://www.instagram.com/itsjmmaria/" target="_blank" class="social-card p-12 border border-slate-100 rounded-[3rem] bg-white flex flex-col items-center">
                    <span class="follow-badge">Follow</span>
                    <i class="fab fa-instagram text-5xl mb-6 text-pink-600"></i>
                    <p class="font-black text-[11px] uppercase tracking-widest">Instagram</p>
                </a>
                
                <a href="https://www.tiktok.com/@itsjmmaria" target="_blank" class="social-card p-12 border border-slate-100 rounded-[3rem] bg-white flex flex-col items-center">
                    <span class="follow-badge">Follow</span>
                    <i class="fab fa-tiktok text-5xl mb-6 text-black"></i>
                    <p class="font-black text-[11px] uppercase tracking-widest">TikTok</p>
                </a>
                
                <a href="https://www.facebook.com/janinamariac" target="_blank" class="social-card p-12 border border-slate-100 rounded-[3rem] bg-white flex flex-col items-center">
                    <span class="follow-badge">Follow</span>
                    <i class="fab fa-facebook text-5xl mb-6 text-blue-600"></i>
                    <p class="font-black text-[11px] uppercase tracking-widest">Facebook</p>
                </a>
                
                <a href="https://www.youtube.com/@jmmaria?sub_confirmation=1" target="_blank" class="social-card p-12 border border-slate-100 rounded-[3rem] bg-white flex flex-col items-center">
                    <span class="follow-badge" style="background: black;">Subscribe</span>
                    <i class="fab fa-youtube text-5xl mb-6 text-red-600"></i>
                    <p class="font-black text-[11px] uppercase tracking-widest">YouTube</p>
                </a>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center text-slate-300 text-[9px] font-bold uppercase tracking-[0.4em]">
        &copy; 2026 JM MARIA | Built for Conversion
    </footer>

</body>
</html>
