<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JM MARIA | jmmaria.com</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Monsieur+La+Doulaise&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        iframe { width: 100%; border: none; display: block; }
        
        /* OPTION 4: THE SCRIPT ICON LOGO SYSTEM */
        .nav-logo-wrap {
            display: flex;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
        }

        .jm-monogram {
            font-weight: 900;
            font-size: 18px;
            letter-spacing: -1.5px;
            color: #000;
            line-height: 1;
        }

        .logo-divider {
            width: 1px;
            height: 24px;
            background-color: #e2e8f0;
            margin: 0 14px;
            transform: rotate(18deg); /* Organic travel tilt */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .signature-logo {
            font-family: 'Monsieur La Doulaise', cursive;
            font-size: 46px; /* Elegant thin script needs more scale */
            color: #000;
            line-height: 0.8;
            margin-bottom: 4px; /* Optically centers the script flourish */
            transition: all 0.4s ease;
        }

        /* Hover Interactions */
        .nav-container:hover .logo-divider {
            background-color: #ef4444; /* Signature Red */
            transform: rotate(0deg);
            height: 30px;
        }

        .nav-container:hover .signature-logo {
            color: #ef4444;
            transform: translateX(3px);
        }
    </style>
</head>
<body class="bg-white">

    <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-slate-100 h-20 flex items-center px-8 justify-between nav-container">
        
        <a href="#" class="nav-logo-wrap">
            <div class="jm-monogram">JM</div>
            <div class="logo-divider"></div>
            <div class="signature-logo">Maria</div>
        </a>

        <div class="hidden lg:flex space-x-8 text-[8px] font-bold uppercase tracking-[0.25em] text-slate-400">
            <a href="#travel" class="hover:text-black transition-colors">01 Archive</a>
            <a href="#hotels" class="hover:text-black transition-colors">02 Hotels</a>
            <a href="#cafes" class="hover:text-black transition-colors">03 Cafes</a>
            <a href="#connect" class="hover:text-black transition-colors">04 Connect</a>
            <a href="#shop" class="hover:text-black transition-colors">05 Shop</a>
            <a href="#inquiries" class="text-red-600 font-black">06 Inquiries</a>
        </div>
        
        <a href="https://www.youtube.com/@jmmaria" target="_blank" class="bg-black text-white px-7 py-3.5 rounded-full text-[9px] font-black uppercase tracking-widest hover:bg-red-600 transition-all shadow-sm">
            Subscribe
        </a>
    </nav>

    <main>
        <div id="travel">
            <iframe src="chapter-1.html" onload="this.style.height=this.contentWindow.document.body.scrollHeight+'px';"></iframe>
        </div>
        <div id="hotels">
            <iframe src="chapter-2.html" onload="this.style.height=this.contentWindow.document.body.scrollHeight+'px';"></iframe>
        </div>
        <div id="cafes">
            <iframe src="chapter-3.html" onload="this.style.height=this.contentWindow.document.body.scrollHeight+'px';"></iframe>
        </div>
        <div id="connect">
            <iframe src="chapter-4.html" onload="this.style.height=this.contentWindow.document.body.scrollHeight+'px';"></iframe>
        </div>
        <div id="shop">
            <iframe src="chapter-5.html" onload="this.style.height=this.contentWindow.document.body.scrollHeight+'px';"></iframe>
        </div>
        <div id="inquiries">
            <iframe src="chapter-6.html" onload="this.style.height=this.contentWindow.document.body.scrollHeight+'px';"></iframe>
        </div>
    </main>

    <footer class="py-16 bg-black text-center">
        <div class="mb-6 opacity-20 invert grayscale">
            <span class="jm-monogram text-white">JM</span>
        </div>
        <p class="text-[9px] font-bold text-slate-600 uppercase tracking-[1em]">© 2026 JM MARIA | jmmaria.com</p>
    </footer>

</body>
</html>
