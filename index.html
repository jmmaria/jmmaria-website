    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .serif-title { font-family: 'Playfair Display', serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Carousel Logic */
        .carousel-container {
            overflow: hidden;
            width: 100%;
            position: relative;
        }
        .video-feed {
            display: flex;
            gap: 2rem;
            padding-bottom: 3rem;
            cursor: grab;
            user-select: none;
        }
        .video-card {
            min-width: 85vw;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        @media (min-width: 768px) { .video-card { min-width: 600px; } }

        .video-container { 
            position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; 
            border-radius: 2rem; background: #000; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; pointer-events: auto; }

        /* Navigation Circle */
        .nav-jm {
            width: 40px; height: 40px; background: black; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>

    </section>

    <script>
        const feed = document.getElementById('videoFeed');
        const wrapper = document.getElementById('carouselWrapper');
        let scrollSpeed = 1; // Adjust speed here
        let isPaused = false;

        // Clone items for infinite effect
        const cards = Array.from(feed.children);
        cards.forEach(card => {
            const clone = card.cloneNode(true);
            feed.appendChild(clone);
        });

        // Auto Scroll Function
        function step() {
            if (!isPaused) {
                feed.scrollLeft += scrollSpeed;
                if (feed.scrollLeft >= feed.scrollWidth / 2) {
                    feed.scrollLeft = 0;
                }
            }
            requestAnimationFrame(step);
        }

        // Pause on Hover/Touch
        wrapper.addEventListener('mouseenter', () => isPaused = true);
        wrapper.addEventListener('mouseleave', () => isPaused = false);
        wrapper.addEventListener('touchstart', () => isPaused = true);
        wrapper.addEventListener('touchend', () => isPaused = false);

        // Start the engine
        requestAnimationFrame(step);
    </script>
